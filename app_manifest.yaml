# Template manifest.
# Render a concrete installable manifest with:
#   APP_BASE_URL=https://your-app.example.com python scripts/render_manifest.py > build/app_manifest.generated.yaml
_metadata:
  major_version: 2
  minor_version: 1
display_information:
  name: Slack Assistant
  description: Personal weekday Slack digests powered by Slack search and Upstage summaries.
  long_description: >-
    Internal Slack assistant that lets each user authorize read/search access to their own Slack
    context, configure a weekday digest schedule, and receive compact DM digests with permalinks
    back to relevant discussions. The app also keeps the manual Summarize thread shortcut for
    one-off catch-up.
  background_color: "#4A154B"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Slack Assistant
    always_online: false
  shortcuts:
    - name: Summarize thread
      description: Summarize the selected Slack thread and send the result back in Slack.
      type: message
      callback_id: summarize_thread
    - name: Configure digest settings
      description: Configure your personal weekday digest schedule, timezone, and watched emojis.
      type: global
      callback_id: configure_digest_settings
  slash_commands:
    - command: /digest
      description: Open Slack Assistant setup and digest actions.
      usage_hint: "[settings|help]"
      should_escape: false
      url: __APP_BASE_URL__/slack/events
oauth_config:
  redirect_urls:
    - __APP_BASE_URL__/slack/oauth_redirect
  scopes:
    bot:
      - chat:write
      - commands
    user:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - search:read.public
      - search:read.private
      - search:read.im
      - search:read.mpim
      - users:read
settings:
  event_subscriptions:
    request_url: __APP_BASE_URL__/slack/events
    bot_events:
      - app_home_opened
  interactivity:
    is_enabled: true
    request_url: __APP_BASE_URL__/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
